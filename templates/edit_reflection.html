<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>反省編集</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <a href="/home">ホーム</a>
    <a href="/search">検索</a>
    <a href="/members">メンバー</a>
    <a href="/logout">ログアウト</a>
</nav>

<div class="container">

    <h1>反省編集</h1>

    <div class="card">

        <p>
            日付：{{ row["date"] }}
        </p>

        <p>
            名前：{{ row["name"] }}
        </p>

        <p>
            パート：{{ row["part"] }}
        </p>

    </div>

    <form method="POST">

        <textarea
            name="reflection"
            rows="10"
            required>{{ row["reflection"] }}</textarea>

        <button type="submit">
            保存
        </button>

    </form>

</div>

</body>
</html>
