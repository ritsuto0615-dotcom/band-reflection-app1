<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>メンバー管理</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>

    <a href="/home">🏠 ホーム</a>
    <a href="/search">🔍 検索</a>
    <a href="/members">👥 メンバー</a>
    <a href="/logout">🚪 ログアウト</a>

</nav>

<div class="container">

    <h1>👥 メンバー管理</h1>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="名前"
            required>

        <input
            type="text"
            name="part"
            placeholder="パート"
            required>

        <button type="submit">
            ➕ メンバー追加
        </button>

    </form>

    {% for member in members %}

        <div class="card member-card">

            <div>

                <h3>
                    👤 {{ member["name"] }}
                </h3>

                <p>
                    🎺 {{ member["part"] }}
                </p>

            </div>

            <a class="delete-btn"
               href="/delete_member/{{ member['id'] }}"
               onclick="return confirm('削除しますか？')">
                🗑️ 削除
            </a>

        </div>

    {% endfor %}

</div>

</body>
</html>
