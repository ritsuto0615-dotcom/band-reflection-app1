<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <!-- スマホ対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>全体反省入力</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <a href="/home">🏠 ホーム</a>
    <a href="/search">🔍 検索</a>
    <a href="/members">👥 メンバー</a>
    <a href="/logout">🚪 ログアウト</a>
</nav>

<div class="container">

    <div class="card">

        <h1>📝 全体反省入力</h1>

        <form method="POST">

            <label>日付</label>

            <input
                type="date"
                name="date"
                required>

            <label>反省内容</label>

            <textarea
                name="reflection"
                rows="12"
                placeholder="今日の全体反省を入力してください"
                required></textarea>

            <button type="submit">
                保存する
            </button>

        </form>

    </div>

</div>

</body>
</html>
